name: BCP CI

on:
  push:
    paths:
      - 'IT-BCP-ITSCM-System/**'
      - '.github/workflows/ci-bcp.yml'
  pull_request:
    paths:
      - 'IT-BCP-ITSCM-System/**'
      - '.github/workflows/ci-bcp.yml'

jobs:
  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IT-BCP-ITSCM-System/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: IT-BCP-ITSCM-System/backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IT-BCP-ITSCM-System/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: IT-BCP-ITSCM-System/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t bcp-backend:ci IT-BCP-ITSCM-System/backend/
      - name: Build frontend image
        run: docker build -t bcp-frontend:ci IT-BCP-ITSCM-System/frontend/
