name: ZTIG CI

on:
  push:
    paths:
      - 'ZeroTrust-ID-Governance/**'
      - '.github/workflows/ci-ztig.yml'
  pull_request:
    paths:
      - 'ZeroTrust-ID-Governance/**'
      - '.github/workflows/ci-ztig.yml'

jobs:
  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ZeroTrust-ID-Governance/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ZeroTrust-ID-Governance/backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ZeroTrust-ID-Governance/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ZeroTrust-ID-Governance/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t ztig-backend:ci ZeroTrust-ID-Governance/backend/
      - name: Build frontend image
        run: docker build -t ztig-frontend:ci ZeroTrust-ID-Governance/frontend/
