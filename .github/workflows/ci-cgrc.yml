name: CGRC CI

on:
  push:
    paths:
      - 'Construction-GRC-System/**'
      - '.github/workflows/ci-cgrc.yml'
  pull_request:
    paths:
      - 'Construction-GRC-System/**'
      - '.github/workflows/ci-cgrc.yml'

jobs:
  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Construction-GRC-System/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: Construction-GRC-System/backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest --cov=apps --cov-report=term-missing --cov-fail-under=80

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Construction-GRC-System/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Construction-GRC-System/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t cgrc-backend:ci Construction-GRC-System/backend/
      - name: Build frontend image
        run: docker build -t cgrc-frontend:ci Construction-GRC-System/frontend/
